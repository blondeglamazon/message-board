buildscript {
    ext.kotlin_version = '1.9.22'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'
        // This is the magic line AdMob needs!
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

// --- MASTER VARIABLE LIST (Updated to prevent future errors) ---
ext {
    minSdkVersion = 24
    compileSdkVersion = 36
    targetSdkVersion = 36
    
    // Standard Android Libraries
    androidxAppCompatVersion = '1.6.1'
    androidxCoreVersion = '1.10.1' 
    androidxMaterialVersion = '1.9.0'
    androidxActivityVersion = '1.8.0'
    androidxFragmentVersion = '1.6.2'
    androidxCoordinatorLayoutVersion = '1.2.0'
    coreSplashScreenVersion = '1.0.1' 
    
    // Testing Libraries (This was the missing piece)
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.1.5'
    androidxEspressoCoreVersion = '3.5.1'
    
    // Capacitor/Cordova
    cordovaAndroidVersion = '10.1.1'
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
    
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                // Force the plugin to use the same compileSdk as your main app
                compileSdk = rootProject.ext.compileSdkVersion
            }
        }
    }
}

tasks.register('clean', Delete) {
    delete rootProject.buildDir
}