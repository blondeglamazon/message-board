buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.1'
        classpath 'com.google.gms:google-services:4.4.4'
    }
}

// --- MASTER VARIABLE LIST (Updated to prevent future errors) ---
ext {
    minSdkVersion = 23
    compileSdkVersion = 36
    targetSdkVersion = 36
    
    // Standard Android Libraries
    androidxAppCompatVersion = '1.6.1'
    androidxCoreVersion = '1.10.1' 
    androidxMaterialVersion = '1.9.0'
    androidxActivityVersion = '1.8.0'
    androidxFragmentVersion = '1.6.2'
    androidxCoordinatorLayoutVersion = '1.2.0'
    coreSplashScreenVersion = '1.0.1' 
    
    // Testing Libraries (This was the missing piece)
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.1.5'
    androidxEspressoCoreVersion = '3.5.1'
    
    // Capacitor/Cordova
    cordovaAndroidVersion = '10.1.1'
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
    // Force the browser library to 1.8.0 globally to bypass the API 35/36 conflict
    
        }
    



tasks.register('clean', Delete) {
    delete rootProject.buildDir
}